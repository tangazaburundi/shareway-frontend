<aside class="ad-sidebar">
  <div class="ad-label">
    <span class="ad-tag">{{ langService.t('ad.sponsored') }}</span>
  </div>

  @for (ad of sidebarAds(); track ad.id) {
  <div class="ad-card" (click)="trackClick(ad)" role="button" tabindex="0">
    @if (ad.imageUrl) {
    <div class="ad-image" [style.backgroundImage]="'url(' + ad.imageUrl + ')'">
    </div>
    } @else {
    <div class="ad-image ad-image-placeholder">
      <span class="ad-badge">📢</span>
    </div>
    }
    <div class="ad-content">
      <p class="ad-text">{{ ad.title }}</p>
      @if (ad.description) {
      <p class="ad-desc">{{ ad.description }}</p>
      }
    </div>
  </div>
  }
</aside>
