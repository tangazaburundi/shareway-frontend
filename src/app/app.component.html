<app-navbar />

<app-ad-banner />

<div class="app-body">
  <main class="main-content">
    <router-outlet />
  </main>
  <app-ad-sidebar />
</div>

@if (isHome) {
  <section class="cta-section">
    <div class="cta-inner">
      <h2 class="cta-title">Prêt à voyager ?</h2>
      <p class="cta-text">Rejoignez des milliers de voyageurs qui font confiance à ShareWay pour leurs trajets quotidiens.</p>
      @if (isLoggedIn) {
        <a routerLink="/dashboard" class="btn btn-primary btn-lg">Mon tableau de bord</a>
      } @else {
        <a routerLink="/auth/register" class="btn btn-primary btn-lg">Créer un compte gratuit</a>
      }
    </div>
  </section>
}

<app-footer />

<app-ad-bottom-banner />

<app-cookie-consent />
<app-toast-container />
