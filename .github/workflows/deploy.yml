name: Deploy Frontend

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/tangaza/shareway-backend
            git -C /opt/tangaza/shareway-frontend pull origin master
            docker compose build --no-cache frontend
            docker create --name temp-frontend tangaza-frontend
            docker cp temp-frontend:/usr/share/nginx/html /tmp/shareway-html
            docker rm temp-frontend
            rm -rf /usr/share/nginx/html/*
            cp -r /tmp/shareway-html/* /usr/share/nginx/html/
            rm -rf /tmp/shareway-html
            nginx -s reload
            docker image prune -f
